name: Update Place Version

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔧 Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: 🏠 Update place version
        run: lune run update-place-version ${{ secrets.PHOTOBOOTH_PLACE_UPDATE_API_KEY }}